<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>管理员面板 | 标注信息收集系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0b1120;
            color: #eef2ff;
            padding: 24px 20px;
            line-height: 1.4;
        }

        /* 容器 */
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 顶部栏 —— 极简，无外部图标 */
        .top-nav {
            background: rgba(18, 25, 45, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #2d3a5e;
            margin-bottom: 32px;
        }
        .brand {
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: -0.2px;
            background: linear-gradient(135deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .badge-admin {
            background: #8b5cf6;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .logout-btn, .refresh-btn {
            background: #334155;
            border: none;
            padding: 6px 18px;
            border-radius: 2rem;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }
        .logout-btn:hover {
            background: #ef4444;
        }
        .refresh-btn:hover {
            background: #3b82f6;
        }

        /* 统计卡片 - 无图标，纯数字卡片 */
        .stats-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            padding: 1.2rem 1.5rem;
            flex: 1;
            min-width: 160px;
            border: 1px solid #2d3a5e;
        }
        .stat-card h4 {
            font-size: 0.8rem;
            font-weight: 500;
            color: #9ca3af;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }
        .stat-number {
            font-size: 2.3rem;
            font-weight: 800;
            background: linear-gradient(145deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* 表格区域 + 标题 */
        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 1.8rem 0 1rem 0;
            border-left: 4px solid #8b5cf6;
            padding-left: 16px;
        }
        .table-wrapper {
            overflow-x: auto;
            border-radius: 1.2rem;
            background: rgba(18, 25, 45, 0.6);
            border: 1px solid #1e293b;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }
        th {
            text-align: left;
            padding: 12px 14px;
            background: #0f172a;
            color: #cbd5e6;
            font-weight: 600;
        }
        td {
            padding: 10px 14px;
            border-bottom: 1px solid #1e293b;
            color: #e2e8f0;
        }
        tr:hover td {
            background: #1e293b70;
        }

        /* 控制项区域 (一行一个) */
        .control-section, .danger-section {
            margin: 2rem 0 1rem;
        }
        .control-item-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 16px;
        }
        .control-row {
            background: rgba(12, 20, 35, 0.85);
            border: 1px solid #2d3a5e;
            border-radius: 1.2rem;
            padding: 16px 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            transition: 0.1s;
        }
        .control-info {
            flex: 3;
            min-width: 200px;
        }
        .control-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .control-desc {
            font-size: 0.8rem;
            color: #a0aec0;
            line-height: 1.4;
        }
        .control-btn {
            background: #2d3a5e;
            border: none;
            padding: 8px 20px;
            border-radius: 2rem;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
            white-space: nowrap;
            margin-left: 16px;
        }
        .control-btn.primary {
            background: #3b82f6;
        }
        .control-btn.primary:hover {
            background: #2563eb;
        }
        .control-btn.danger {
            background: #b91c1c;
        }
        .control-btn.danger:hover {
            background: #7f1a1a;
        }
        .control-btn:hover {
            transform: scale(0.98);
        }

        /* 危险区独立风格 */
        .danger-section .control-row {
            border-left: 3px solid #f97316;
            background: rgba(127, 29, 29, 0.15);
        }

        /* toast 提示（简约无图标库） */
        .toast-message {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1e293b;
            border-left: 4px solid;
            padding: 10px 18px;
            border-radius: 1rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            z-index: 1100;
            font-weight: 500;
            font-size: 0.85rem;
            max-width: 360px;
            word-break: break-word;
            backdrop-filter: blur(12px);
        }
        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .text-muted {
            color: #8ca3b9;
        }
        hr {
            border-color: #1e293b;
            margin: 0.5rem 0;
        }
    </style>
</head>
<body>
<div class="admin-container">
    <!-- 极简顶部栏，无第三方资源 -->
    <div class="top-nav">
        <div class="brand">管理员面板</div>
        <div class="user-info">
            <span id="adminUsername">👤 加载中...</span>
            <span class="badge-admin">ROOT</span>
            <button id="refreshDataBtn" class="refresh-btn">⟳ 刷新数据</button>
            <button id="logoutBtn" class="logout-btn">🚪 退出</button>
        </div>
    </div>

    <!-- 统计卡片 -->
    <div class="stats-grid">
        <div class="stat-card"><h4>📊 总标注记录数</h4><div class="stat-number" id="totalRecords">--</div></div>
        <div class="stat-card"><h4>⏱️ 总标注时长 (秒)</h4><div class="stat-number" id="totalDuration">--</div></div>
        <div class="stat-card"><h4>👥 活跃成员数</h4><div class="stat-number" id="totalUsers">--</div></div>
    </div>

    <!-- 所有成员列表 -->
    <div class="section-title">👥 所有成员 & 统计</div>
    <div class="table-wrapper">
        <table id="usersTable">
            <thead>
                <tr><th>用户名</th><th>角色</th><th>标注数量</th><th>总时长(秒)</th></tr>
            </thead>
            <tbody id="usersTableBody">
                <tr><td colspan="4" style="text-align:center">加载成员数据...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- 全量标注明细 -->
    <div class="section-title">📌 全量标注任务明细</div>
    <div class="table-wrapper">
        <table id="allAnnotationsTable">
            <thead>
                <tr><th>ID</th><th>用户名</th><th>任务名称</th><th>时长(秒)</th><th>创建时间</th><th>版本</th></tr>
            </thead>
            <tbody id="annotationsTableBody">
                <tr><td colspan="6" style="text-align:center">加载任务记录...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- 服务器控制选项：一行一个控制项（标题+描述+按钮） -->
    <div class="control-section">
        <div class="section-title">⚙️ 服务器控制选项</div>
        <div class="control-item-list" id="serverControlsContainer">
            <!-- 静态配置 3个核心控制项：一致性检查、清理幂等键、导出报表 -->
            <!-- 通过js绑定事件，确保api调用，同时满足一行一个的样式 -->
        </div>
    </div>

    <!-- 危险操作区 - 一行一个 -->
    <div class="danger-section">
        <div class="section-title">⚠️ 危险操作区 (谨慎执行)</div>
        <div class="control-item-list" id="dangerControlsContainer">
            <!-- 静态预留危险操作，实现一行一个样式 -->
        </div>
    </div>
</div>

<script>
    // ======================== 配置 ========================
    // API 基地址 (与后端同域，或者手动指定)
    const BASE_URL = (() => {
        if (window.location.origin === 'file://') return 'http://localhost:5000';
        return '';   // 同域部署
    })();

    // ---------- 辅助函数 ----------
    function showToast(message, type = 'info', duration = 4500) {
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        let borderColor = '#3b82f6';
        let prefix = 'ℹ️ ';
        if (type === 'success') { borderColor = '#22c55e'; prefix = '✅ '; }
        if (type === 'error') { borderColor = '#ef4444'; prefix = '❌ '; }
        if (type === 'warning') { borderColor = '#f97316'; prefix = '⚠️ '; }
        toast.style.borderLeftColor = borderColor;
        toast.innerHTML = `${prefix} ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), duration);
    }

    // 封装fetch，自动处理未授权跳转
    async function adminFetch(url, options = {}) {
        const fullUrl = BASE_URL + url;
        const response = await fetch(fullUrl, {
            ...options,
            credentials: 'include',
            headers: { 'Content-Type': 'application/json', ...options.headers }
        });
        if (response.status === 401 || response.status === 403) {
            showToast('登录已过期或权限不足，请重新登录', 'error');
            setTimeout(() => { window.location.href = 'login.html'; }, 1500);
            throw new Error('Unauthorized');
        }
        return response;
    }

    // 检查管理员会话
    async function checkAdminSession() {
        try {
            const resp = await fetch(`${BASE_URL}/api/session`, { credentials: 'include' });
            if (!resp.ok) throw new Error('no session');
            const data = await resp.json();
            if (!data.username || data.role !== 'admin') {
                showToast('当前用户非管理员，将跳转至标注员界面', 'error');
                setTimeout(() => { window.location.href = 'annotator.html'; }, 1000);
                return false;
            }
            document.getElementById('adminUsername').innerHTML = `👑 ${data.username}`;
            return true;
        } catch (err) {
            window.location.href = 'login.html';
            return false;
        }
    }

    // ---------- 加载数据接口 ----------
    async function loadSummary() {
        try {
            const res = await adminFetch('/api/admin/summary');
            const data = await res.json();
            document.getElementById('totalRecords').innerText = data.total_records ?? 0;
            document.getElementById('totalDuration').innerText = (data.total_duration_seconds ?? 0).toFixed(2);
        } catch(e) { console.warn(e); showToast('获取汇总数据失败', 'error'); }
    }

    async function loadUserStats() {
        try {
            const res = await adminFetch('/api/admin/users');
            const users = await res.json();
            document.getElementById('totalUsers').innerText = users.length;
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = '';
            if (!users.length) {
                tbody.innerHTML = '<tr><td colspan="4">暂无成员数据</td></tr>';
                return;
            }
            users.forEach(user => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = user.username;
                row.insertCell(1).innerText = user.role === 'admin' ? '管理员' : '标注员';
                row.insertCell(2).innerText = user.annotation_count ?? 0;
                row.insertCell(3).innerText = (user.total_duration_seconds || 0).toFixed(2);
            });
        } catch(e) { showToast('加载成员统计失败', 'error'); }
    }

    async function loadAllAnnotations() {
        try {
            const res = await adminFetch('/api/admin/annotations');
            const records = await res.json();
            const tbody = document.getElementById('annotationsTableBody');
            tbody.innerHTML = '';
            if (!records.length) {
                tbody.innerHTML = '<tr><td colspan="6">暂无标注记录</td></tr>';
                return;
            }
            records.forEach(rec => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = rec.id;
                row.insertCell(1).innerText = rec.username;
                row.insertCell(2).innerText = rec.task_name || '-';
                row.insertCell(3).innerText = rec.duration_seconds;
                row.insertCell(4).innerText = rec.created_at || '-';
                row.insertCell(5).innerText = rec.version || 'v1';
            });
        } catch(e) { showToast('加载标注明细失败', 'error'); }
    }

    async function refreshAllData() {
        await Promise.all([loadSummary(), loadUserStats(), loadAllAnnotations()]);
        showToast('数据已刷新', 'success', 2000);
    }

    // ---------- 控制项核心动作 ----------
    // 1. 一致性检查
    async function actionConsistencyCheck(btn) {
        const res = await adminFetch('/api/admin/consistency_check', { method: 'GET' });
        if (res.status === 200) {
            const data = await res.json();
            showToast(`✅ 一致性检查通过: ${data.message || '数据一致'}`, 'success');
        } else if (res.status === 409) {
            const errorData = await res.json();
            let issueMsg = '数据不一致:\n';
            if (errorData.issues && errorData.issues.length) {
                errorData.issues.forEach(issue => {
                    issueMsg += `用户 ${issue.username}: 分组统计 ${issue.group_count} 条，明细 ${issue.detail_count} 条\n`;
                });
                showToast(issueMsg, 'error', 8000);
            } else {
                showToast(errorData.error || '检测到不一致', 'error');
            }
        } else {
            const err = await res.json();
            showToast(err.error || '一致性检查失败', 'error');
        }
    }

    // 2. 清理过期幂等键
    async function actionCleanIdempotency(btn) {
        const res = await adminFetch('/api/admin/cleanup_idempotency_keys', { method: 'POST' });
        const data = await res.json();
        if (res.ok) {
            showToast(`✅ 清理完成，共删除 ${data.deleted_count} 条过期幂等键`, 'success');
        } else {
            showToast(data.error || '清理失败', 'error');
        }
    }

    // 3. 导出 Excel
    async function actionExportExcel(btn) {
        try {
            window.open(`${BASE_URL}/excel`, '_blank');
            showToast('正在生成报表，请稍等...', 'info', 3000);
        } catch(e) {
            showToast('导出失败，请检查网络', 'error');
        }
    }

    // 导出并重置
    async function actionExportAndReset(btn) {
        try {
            const res = await adminFetch('/api/admin/export_and_reset', {
                method: 'POST',
                body: JSON.stringify({ confirm: true })
            });
            const data = await res.json();
            showToast(`✅ ${data.message}`, 'success', 5000);
            // 自动下载快照文件
            if (data.download_url) {
                window.open(data.download_url, '_blank');
            }
            // 重置后数据已清空，刷新页面展示
            await refreshAllData();
        } catch (err) {
            if (err.message === 'Unauthorized') return;
            showToast(`导出并重置失败: ${err.message || '未知错误'}`, 'error');
        }
    }

    // 紧急停止
    async function actionEmergencyStop(btn) {
        try {
            const res = await adminFetch('/api/admin/emergency_stop', {
                method: 'POST',
                body: JSON.stringify({ confirm: true })
            });
            const data = await res.json();
            showToast(`⚠️ ${data.message}，应用即将退出。`, 'warning', 8000);
            // 禁用页面所有操作按钮，防止继续调用
            document.querySelectorAll('.control-btn, .refresh-btn, .logout-btn').forEach(btn => {
                btn.disabled = true;
            });
            // 可选：显示提示条，页面不再可用
            const container = document.querySelector('.admin-container');
            const haltMsg = document.createElement('div');
            haltMsg.className = 'stat-card';
            haltMsg.style.background = '#7f1a1a';
            haltMsg.innerHTML = '<h4>🚨 应用已触发紧急停止，进程即将终止</h4>';
            container.prepend(haltMsg);
        } catch (err) {
            if (err.message === 'Unauthorized') return;
            showToast(`紧急停止失败: ${err.message}`, 'error');
        }
    }

    // ========== 动态生成控制项（一行一个，无外部图标库） ==========
    // 服务器控制项配置 (id, 标题, 描述, 按钮文字, 动作, 是否为primary样式)
    const serverControls = [
        {
            id: 'consistency',
            title: '🔍 数据一致性检查',
            description: '对比明细记录与分组聚合结果，检测数据库异常或不一致。',
            buttonText: '执行检查',
            primary: true,
            action: actionConsistencyCheck
        },
        {
            id: 'cleanup',
            title: '🧹 清理过期幂等键',
            description: '我们使用幂等键技术来确保用户多次执行同一操作的结果与执行一次完全一致。由于过期后的键不再参与幂等判断，清理过期幂等键以释放存储空间。',
            buttonText: '立即清理',
            primary: false,
            action: actionCleanIdempotency
        },
        {
            id: 'export',
            title: '📎 导出 Excel 报表',
            description: '生成包含标注记录总表和个人统计的 Excel 文件 (xlsx)',
            buttonText: '下载报表',
            primary: true,
            action: actionExportExcel
        }
    ];

    // 危险操作配置 ( 一行一个 )
    const dangerControls = [
        {
            id: 'exportAndReset',
            title: '导出并重置标注数据',
            description: '旧的工作日结束，新的工作日开始时，执行此操作导出并清空数据。',
            buttonText: '导出并重置',
            action: actionExportAndReset
        },
        {
            id: 'emergencyStop',
            title: '紧急停止应用',
            description: '当数据明显异常时，执行此操作保存紧急快照后立即终止服务\n宁可停止服务，也不破坏数据。',
            buttonText: '紧急停止',
            action: actionEmergencyStop
        }
    ];

    // 渲染服务器控制区
    function renderServerControls() {
        const container = document.getElementById('serverControlsContainer');
        if (!container) return;
        container.innerHTML = '';
        for (const ctrl of serverControls) {
            const row = document.createElement('div');
            row.className = 'control-row';
            row.innerHTML = `
                <div class="control-info">
                    <div class="control-title">${escapeHtml(ctrl.title)}</div>
                    <div class="control-desc">${escapeHtml(ctrl.description)}</div>
                </div>
                <button class="control-btn ${ctrl.primary ? 'primary' : ''}" data-id="${ctrl.id}">${escapeHtml(ctrl.buttonText)}</button>
            `;
            const btn = row.querySelector('button');
            btn.addEventListener('click', async (e) => {
                e.preventDefault();
                const originalText = btn.innerHTML;
                btn.disabled = true;
                btn.innerHTML = '<span class="loading-spinner"></span> 执行中...';
                try {
                    await ctrl.action(btn);
                } catch (err) {
                    console.error(err);
                    showToast(`操作失败: ${err.message || '未知错误'}`, 'error');
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                }
            });
            container.appendChild(row);
        }
    }

    // 渲染危险操作区
    function renderDangerControls() {
        const container = document.getElementById('dangerControlsContainer');
        if (!container) return;
        container.innerHTML = '';
        for (const danger of dangerControls) {
            const row = document.createElement('div');
            row.className = 'control-row';
            row.innerHTML = `
                <div class="control-info">
                    <div class="control-title">${escapeHtml(danger.title)}</div>
                    <div class="control-desc">${escapeHtml(danger.description)}</div>
                </div>
                <button class="control-btn danger" data-danger="${danger.id}">${escapeHtml(danger.buttonText)}</button>
            `;
            const btn = row.querySelector('button');
            btn.addEventListener('click', async (e) => {
                e.preventDefault();
                if (!confirm(`⚠️ 危险操作: ${danger.title}\n请确认是否继续？`)) return;
                const originalText = btn.innerHTML;
                btn.disabled = true;
                btn.innerHTML = '<span class="loading-spinner"></span> 处理中...';
                try {
                    await danger.action(btn);
                } catch (err) {
                    showToast(`错误: ${err.message}`, 'error');
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                }
            });
            container.appendChild(row);
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 退出登录
    async function logout() {
        try {
            await fetch(`${BASE_URL}/api/logout`, { method: 'POST', credentials: 'include' });
        } catch(e) {}
        window.location.href = 'login.html';
    }

    // 初始化页面
    (async function init() {
        const isAdmin = await checkAdminSession();
        if (!isAdmin) return;

        // 加载数据
        await refreshAllData();

        // 渲染服务器控制选项（一行一个）
        renderServerControls();
        // 渲染危险操作区（一行一个）
        renderDangerControls();

        // 绑定顶部刷新按钮
        const refreshBtn = document.getElementById('refreshDataBtn');
        if (refreshBtn) {
            refreshBtn.addEventListener('click', async () => {
                refreshBtn.disabled = true;
                refreshBtn.innerHTML = '<span class="loading-spinner"></span> 刷新中...';
                try {
                    await refreshAllData();
                } finally {
                    refreshBtn.disabled = false;
                    refreshBtn.innerHTML = '⟳ 刷新数据';
                }
            });
        }

        // 退出按钮
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) logoutBtn.addEventListener('click', logout);
    })();
</script>
</body>
</html>
