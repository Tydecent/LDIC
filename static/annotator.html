<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>标注员面板 | 标注信息收集系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0b1120, #030712);
            color: #eef2ff;
            padding: 28px 24px;
            min-height: 100vh;
        }

        .annotator-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 顶部导航 */
        .top-nav {
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(71, 85, 105, 0.5);
            margin-bottom: 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            flex-wrap: wrap;
            gap: 12px;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.3rem;
            background: linear-gradient(135deg, #a5f3fc, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .badge-annotator {
            background: #3b82f6;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .refresh-btn {
            background: #2d3a5e;
            border: none;
            padding: 8px 18px;
            border-radius: 2rem;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .refresh-btn:hover {
            background: #3b4a6e;
            transform: scale(0.96);
        }
        .logout-btn {
            background: #334155;
            border: none;
            padding: 8px 20px;
            border-radius: 2rem;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .logout-btn:hover {
            background: #ef4444;
            transform: scale(0.96);
        }

        /* 统计卡片 */
        .stats-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 1.8rem;
            padding: 1.2rem 1.8rem;
            flex: 1;
            min-width: 180px;
            border: 1px solid rgba(51, 65, 85, 0.6);
        }
        .stat-card h4 {
            font-size: 0.85rem;
            font-weight: 500;
            color: #9ca3af;
            margin-bottom: 8px;
        }
        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(145deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .stat-sub {
            font-size: 0.7rem;
            color: #6b7280;
            margin-top: 4px;
        }

        /* 新增表单区 */
        .form-card {
            background: rgba(12, 20, 35, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 1.8rem;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            border: 1px solid #2d3a5e;
        }
        .form-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            align-items: flex-end;
        }
        .input-group {
            flex: 1;
            min-width: 200px;
        }
        .input-group label {
            display: block;
            font-size: 0.75rem;
            color: #9ca3af;
            margin-bottom: 6px;
        }
        .input-group input {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            padding: 10px 14px;
            border-radius: 1.2rem;
            color: white;
            font-family: monospace;
            transition: 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.3);
        }
        .btn-primary {
            background: linear-gradient(95deg, #3b82f6, #6366f1);
            border: none;
            padding: 10px 28px;
            border-radius: 2rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* 表格区域 */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin: 1.5rem 0 1rem 0;
        }
        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 4px solid #3b82f6;
            padding-left: 16px;
        }
        .table-wrapper {
            overflow-x: auto;
            border-radius: 1.5rem;
            background: rgba(18, 25, 45, 0.5);
            backdrop-filter: blur(4px);
            border: 1px solid #1e293b;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        th {
            text-align: left;
            padding: 14px 16px;
            background: #0f172a;
            color: #cbd5e6;
            font-weight: 600;
        }
        td {
            padding: 12px 16px;
            border-bottom: 1px solid #1e293b;
            color: #e2e8f0;
            word-break: break-word;
        }
        tr:hover td {
            background: #1e293b50;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
        }
        .icon-btn {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1.3rem;
            transition: 0.2s;
            padding: 6px 10px;
            border-radius: 2rem;
            min-width: 44px;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn.edit:hover {
            background: #1e293b;
            color: #3b82f6;
        }
        .icon-btn.delete:hover {
            background: #1e293b;
            color: #ef4444;
        }
        .task-name-cell {
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        @media (max-width: 640px) {
            .task-name-cell {
                max-width: 150px;
            }
            .icon-btn {
                padding: 4px 8px;
                min-width: 40px;
                min-height: 40px;
            }
        }
        .empty-row td {
            text-align: center;
            padding: 2rem;
            color: #9ca3af;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-container {
            background: #0f172a;
            border-radius: 2rem;
            width: 90%;
            max-width: 450px;
            padding: 1.8rem;
            border: 1px solid #334155;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
            transform: scale(0.95);
            transition: transform 0.2s;
        }
        .modal-overlay.active .modal-container {
            transform: scale(1);
        }
        .modal-container h3 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg,#a5f3fc,#818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .modal-field {
            margin-bottom: 1.2rem;
        }
        .modal-field label {
            display: block;
            font-size: 0.75rem;
            color: #9ca3af;
            margin-bottom: 6px;
        }
        .modal-field input, .modal-field .version-display {
            width: 100%;
            background: #1e293b;
            border: 1px solid #334155;
            padding: 10px 14px;
            border-radius: 1.2rem;
            color: white;
            font-size: 1rem;
        }
        .version-display {
            background: #0f172a;
            color: #c084fc;
            font-family: monospace;
        }
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 1.8rem;
        }
        .modal-buttons button {
            padding: 8px 20px;
            border-radius: 2rem;
            border: none;
            font-weight: 500;
            cursor: pointer;
        }
        .modal-cancel {
            background: #334155;
            color: white;
        }
        .modal-submit {
            background: #3b82f6;
            color: white;
        }

        /* Toast提示 */
        .toast-message {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1e293b;
            border-left: 5px solid;
            padding: 12px 20px;
            border-radius: 1rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            z-index: 3000;
            animation: fadeInUp 0.2s ease;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 350px;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .table-loading td {
            text-align: center;
            padding: 2rem;
        }
    </style>
</head>
<body>
<div class="annotator-container">
    <div class="top-nav">
        <div class="brand">✍️ 标注员工作台</div>
        <div class="user-info">
            <span id="annotatorUsername">加载中...</span>
            <span class="badge-annotator">标注员</span>
            <button id="refreshDataBtn" class="refresh-btn">🔄 刷新</button>
            <button id="logoutBtn" class="logout-btn">退出</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <h4>我的标注记录数</h4>
            <div class="stat-number" id="myCountStat">--</div>
        </div>
        <div class="stat-card">
            <h4>总标注时长</h4>
            <div class="stat-number" id="totalDurationStat">--</div>
            <div class="stat-sub" id="durationHumanStat">---</div>
        </div>
    </div>

    <div class="form-card">
        <div class="form-title">📌 新增标注记录</div>
        <div class="form-row">
            <div class="input-group">
                <label>任务名称</label>
                <input type="text" id="taskNameInput" autocomplete="off" placeholder="例如：图像分类-第3批">
            </div>
            <div class="input-group">
                <label>耗时 (秒)</label>
                <input type="number" id="durationInput" step="0.01" placeholder="例如 12.5">
            </div>
            <button id="createRecordBtn" class="btn-primary">➕ 创建记录</button>
        </div>
    </div>

    <div class="section-header">
        <div class="section-title">📋 我的标注记录</div>
    </div>
    <div class="table-wrapper">
        <table id="annotationsTable">
            <thead>
                <tr><th>ID</th><th>任务名称</th><th>时长(秒)</th><th>创建时间</th><th>版本号</th><th>操作</th></tr>
            </thead>
            <tbody id="tableBody">
                <tr class="empty-row"><td colspan="6">加载中...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- 编辑模态框 -->
<div id="editModal" class="modal-overlay">
    <div class="modal-container">
        <h3>✏️ 编辑标注记录</h3>
        <div class="modal-field">
            <label>任务名称</label>
            <input type="text" id="editTaskName" placeholder="任务名称">
        </div>
        <div class="modal-field">
            <label>耗时 (秒)</label>
            <input type="number" step="0.01" id="editDuration" placeholder="耗时秒数">
        </div>
        <div class="modal-field">
            <label>版本号 (乐观锁)</label>
            <div class="version-display" id="editVersionDisplay">-</div>
        </div>
        <div class="modal-buttons">
            <button class="modal-cancel" id="modalCancelBtn">取消</button>
            <button class="modal-submit" id="modalSubmitBtn">保存修改</button>
        </div>
    </div>
</div>

<script>
    // ---------- 配置 ----------
    const BASE_URL = '';  // 使用绝对路径 /api ，无论页面在哪个子目录
    let currentEditId = null;
    let currentEditVersion = null;
    let isDeleting = false;      // 防重复删除
    let isLoading = false;       // 全局刷新锁

    // ---------- 辅助函数 ----------
    function showToast(message, type = 'info', duration = 4000) {
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        let icon = 'ℹ️';
        if (type === 'success') icon = '✅';
        if (type === 'error') icon = '❌';
        if (type === 'warning') icon = '⚠️';
        toast.innerHTML = `${icon} <span>${escapeHtml(message)}</span>`;
        toast.style.borderLeftColor = type === 'success' ? '#4ade80' : (type === 'error' ? '#f87171' : '#3b82f6');
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), duration);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    function formatDurationHuman(seconds) {
        if (isNaN(seconds)) return '0秒';
        const hrs = Math.floor(seconds / 3600);
        const mins = Math.floor((seconds % 3600) / 60);
        const secs = (seconds % 60).toFixed(0);
        if (hrs > 0) return `${hrs}小时${mins}分${secs}秒`;
        if (mins > 0) return `${mins}分${secs}秒`;
        return `${secs}秒`;
    }

    async function authFetch(url, options = {}) {
        const fullUrl = url.startsWith('/') ? url : `${BASE_URL}${url}`;
        const response = await fetch(fullUrl, {
            ...options,
            credentials: 'include',
            headers: { 'Content-Type': 'application/json', ...options.headers }
        });
        if (response.status === 401) {
            showToast('登录已过期，请重新登录', 'error');
            setTimeout(() => { window.location.href = 'login.html'; }, 1500);
            throw new Error('Unauthorized');
        }
        return response;
    }

    // 会话检查
    async function checkSessionAndRole() {
        try {
            const resp = await fetch('/api/session', { credentials: 'include' });
            if (!resp.ok) throw new Error('No session');
            const data = await resp.json();
            if (!data.username) throw new Error('Not logged in');
            if (data.role !== 'annotator') {
                showToast('当前账号非标注员，将跳转至管理员界面', 'warning');
                setTimeout(() => { window.location.href = 'admin.html'; }, 1200);
                return false;
            }
            document.getElementById('annotatorUsername').innerHTML = escapeHtml(data.username);
            return true;
        } catch (err) {
            window.location.href = 'login.html';
            return false;
        }
    }

    // 获取我的记录数量
    async function fetchMyCount() {
        try {
            const resp = await authFetch('/api/mycount');
            const data = await resp.json();
            const count = data.count ?? 0;
            document.getElementById('myCountStat').innerText = count;
            return count;
        } catch (e) {
            console.warn(e);
            document.getElementById('myCountStat').innerText = '0';
            return 0;
        }
    }

    // 获取标注列表 (后端返回数组)
    async function fetchAnnotations() {
        const resp = await authFetch('/api/annotations');
        const records = await resp.json();
        return records;
    }

    // 渲染表格并更新总时长
    function renderTable(records) {
        const tbody = document.getElementById('tableBody');
        if (!records || records.length === 0) {
            tbody.innerHTML = '<tr class="empty-row"><td colspan="6">✨ 暂无标注记录，点击上方创建吧</td></tr>';
            document.getElementById('totalDurationStat').innerText = '0.00';
            document.getElementById('durationHumanStat').innerText = '0秒';
            return;
        }
        let totalDuration = 0;
        tbody.innerHTML = '';
        for (const rec of records) {
            totalDuration += (rec.duration_seconds || 0);
            const row = tbody.insertRow();
            row.insertCell(0).innerText = rec.id;
            const taskCell = row.insertCell(1);
            taskCell.className = 'task-name-cell';
            taskCell.innerText = rec.task_name || '';
            taskCell.title = rec.task_name || '';
            row.insertCell(2).innerText = (rec.duration_seconds || 0).toFixed(2);
            row.insertCell(3).innerText = rec.created_at || '';
            row.insertCell(4).innerText = rec.version;
            const actionCell = row.insertCell(5);
            actionCell.className = 'action-buttons';
            
            const editBtn = document.createElement('button');
            editBtn.className = 'icon-btn edit';
            editBtn.innerHTML = '✏️';
            editBtn.title = '编辑记录';
            editBtn.onclick = () => openEditModal(rec.id, rec.task_name, rec.duration_seconds, rec.version);
            
            const delBtn = document.createElement('button');
            delBtn.className = 'icon-btn delete';
            delBtn.innerHTML = '🗑️';
            delBtn.title = '删除记录';
            delBtn.onclick = () => deleteRecord(rec.id, rec.version);
            
            actionCell.appendChild(editBtn);
            actionCell.appendChild(delBtn);
        }
        document.getElementById('totalDurationStat').innerText = totalDuration.toFixed(2);
        document.getElementById('durationHumanStat').innerText = formatDurationHuman(totalDuration);
    }

    // 全局刷新 (带防抖)
    async function refreshData() {
        if (isLoading) return;
        isLoading = true;
        const tbody = document.getElementById('tableBody');
        const originalHTML = tbody.innerHTML;
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center"><span class="loading-spinner"></span> 刷新中...</td></tr>';
        try {
            const records = await fetchAnnotations();
            renderTable(records);
            await fetchMyCount();
        } catch (err) {
            showToast('刷新失败: ' + err.message, 'error');
            tbody.innerHTML = originalHTML || '<tr class="empty-row"><td colspan="6">加载失败，点击刷新重试</td></tr>';
        } finally {
            isLoading = false;
        }
    }

    // 创建记录
    async function createAnnotation(taskName, durationSeconds) {
        const idempotencyKey = crypto.randomUUID ? crypto.randomUUID() : Date.now() + '-' + Math.random().toString(36);
        const resp = await authFetch('/api/annotations', {
            method: 'POST',
            headers: { 'Idempotency-Key': idempotencyKey },
            body: JSON.stringify({ task_name: taskName, duration_seconds: durationSeconds })
        });
        const data = await resp.json();
        if (resp.ok || resp.status === 201) {
            showToast(`✅ 创建成功！记录ID: ${data.id}`, 'success');
            await refreshData();
            return true;
        } else if (resp.status === 429) {
            showToast('请求正在处理中(幂等保护)，请稍后重试', 'warning');
            return false;
        } else {
            showToast(data.error || '创建失败', 'error');
            return false;
        }
    }

    // 打开编辑模态框
    function openEditModal(id, taskName, duration, version) {
        currentEditId = id;
        currentEditVersion = version;
        document.getElementById('editTaskName').value = taskName || '';
        document.getElementById('editDuration').value = duration;
        document.getElementById('editVersionDisplay').innerText = version;
        const modal = document.getElementById('editModal');
        modal.classList.add('active');
    }

    async function submitEdit() {
        const newTask = document.getElementById('editTaskName').value.trim();
        const newDuration = parseFloat(document.getElementById('editDuration').value);
        if (!newTask) {
            showToast('任务名称不能为空', 'error');
            return;
        }
        if (isNaN(newDuration) || newDuration <= 0 || newDuration > 86400) {
            showToast('请输入有效的时长 (0 < 时长 ≤ 86400秒)', 'error');
            return;
        }
        const modal = document.getElementById('editModal');
        modal.classList.remove('active');
        
        try {
            const resp = await authFetch(`/api/annotations/${currentEditId}`, {
                method: 'PUT',
                body: JSON.stringify({
                    task_name: newTask,
                    duration_seconds: newDuration,
                    version: currentEditVersion
                })
            });
            const data = await resp.json();
            if (resp.ok) {
                showToast('更新成功', 'success');
                await refreshData();
            } else if (resp.status === 409) {
                showToast('数据已被他人修改，请刷新后重新编辑 (乐观锁冲突)', 'error');
                await refreshData();
            } else {
                showToast(data.error || '更新失败', 'error');
            }
        } catch (err) {
            showToast('网络错误，更新失败', 'error');
        } finally {
            currentEditId = null;
            currentEditVersion = null;
        }
    }

    // 删除记录 (携带版本号)
    async function deleteRecord(id, version) {
        if (!confirm(`⚠️ 确定要删除 ID 为 ${id} 的标注记录吗？不可恢复。`)) return;
        if (isDeleting) return;
        isDeleting = true;
        try {
            // 乐观锁删除：请求体中携带 version
            const resp = await authFetch(`/api/annotations/${id}`, {
                method: 'DELETE',
                body: JSON.stringify({ version: version })
            });
            if (resp.ok) {
                showToast('删除成功', 'success');
                await refreshData();
            } else {
                const errData = await resp.json().catch(() => ({}));
                if (resp.status === 409) {
                    showToast('删除冲突：记录已被修改，请刷新后再试', 'error');
                    await refreshData();
                } else {
                    showToast(errData.error || '删除失败', 'error');
                }
            }
        } catch (err) {
            showToast('删除请求失败', 'error');
        } finally {
            isDeleting = false;
        }
    }

    // 登出
    async function logout() {
        try {
            await fetch('/api/logout', { method: 'POST', credentials: 'include' });
        } catch(e) {}
        window.location.href = 'login.html';
    }

    // 绑定创建事件
    function bindCreateEvent() {
        const createBtn = document.getElementById('createRecordBtn');
        const taskInput = document.getElementById('taskNameInput');
        const durInput = document.getElementById('durationInput');
        
        createBtn.addEventListener('click', async () => {
            const taskName = taskInput.value.trim();
            const duration = parseFloat(durInput.value);
            if (!taskName) {
                showToast('任务名称不能为空', 'error');
                return;
            }
            if (isNaN(duration) || duration <= 0 || duration > 86400) {
                showToast('请输入有效的时长 (正数，最大86400秒)', 'error');
                return;
            }
            createBtn.disabled = true;
            const originalText = createBtn.innerHTML;
            createBtn.innerHTML = '<span class="loading-spinner"></span> 创建中...';
            try {
                const success = await createAnnotation(taskName, duration);
                if (success) {
                    taskInput.value = '';
                    durInput.value = '';
                }
            } catch (err) {
                // 错误已在函数中提示
            } finally {
                createBtn.disabled = false;
                createBtn.innerHTML = originalText;
            }
        });
    }

    // 模态框事件
    function bindModalEvents() {
        const modal = document.getElementById('editModal');
        const cancelBtn = document.getElementById('modalCancelBtn');
        const submitBtn = document.getElementById('modalSubmitBtn');
        cancelBtn.addEventListener('click', () => {
            modal.classList.remove('active');
            currentEditId = null;
        });
        submitBtn.addEventListener('click', submitEdit);
        // 点击遮罩关闭
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
                currentEditId = null;
            }
        });
    }

    // 初始化
    (async function init() {
        const valid = await checkSessionAndRole();
        if (!valid) return;
        await refreshData();
        bindCreateEvent();
        bindModalEvents();
        document.getElementById('logoutBtn').addEventListener('click', logout);
        document.getElementById('refreshDataBtn').addEventListener('click', () => refreshData());
    })();
</script>
</body>
</html>
