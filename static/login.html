<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>视频标注系统 · 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* 装饰性背景元素 */
        .bg-bubble {
            position: fixed;
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.15);
            filter: blur(60px);
            z-index: 0;
            pointer-events: none;
        }

        .bubble1 { width: 40vw; height: 40vw; top: -15vw; right: -10vw; }
        .bubble2 { width: 35vw; height: 35vw; bottom: -10vw; left: -15vw; background: rgba(139, 92, 246, 0.15); }

        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 460px;
        }

        .card {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 2.5rem;
            padding: 2rem 2rem 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.05);
            transition: transform 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-icon {
            background: linear-gradient(120deg, #3b82f6, #8b5cf6);
            width: 56px;
            height: 56px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
            margin-bottom: 1rem;
        }

        .logo-icon i {
            color: white;
        }

        h2 {
            color: #f1f5f9;
            font-weight: 600;
            font-size: 1.8rem;
            letter-spacing: -0.3px;
        }

        .sub {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            color: #cbd5e1;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: #64748b;
            font-size: 1.1rem;
        }

        input {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.8rem;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 1.2rem;
            font-size: 1rem;
            color: #f8fafc;
            transition: all 0.2s;
            font-family: 'Inter', monospace;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
            background: #0f172a;
        }

        input::placeholder {
            color: #475569;
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(95deg, #3b82f6, #6366f1);
            border: none;
            padding: 0.9rem;
            border-radius: 1.5rem;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 0.5rem;
            box-shadow: 0 4px 12px rgba(59,130,246,0.3);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(59,130,246,0.5);
            filter: brightness(1.02);
        }

        .error-message {
            background: rgba(220, 38, 38, 0.15);
            border-left: 3px solid #ef4444;
            color: #fecaca;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            font-size: 0.85rem;
            margin-bottom: 1.2rem;
            backdrop-filter: blur(4px);
        }

        .info-note {
            text-align: center;
            margin-top: 1.8rem;
            font-size: 0.75rem;
            color: #5b6e8c;
        }

        .demo-hint {
            background: #0f172a60;
            border-radius: 1rem;
            padding: 0.5rem 1rem;
            text-align: center;
            font-size: 0.8rem;
            color: #a0afc7;
            margin-top: 1rem;
            border: 1px dashed #334155;
        }
    </style>
</head>
<body>
<div class="bg-bubble bubble1"></div>
<div class="bg-bubble bubble2"></div>

<div class="login-container">
    <div class="card">
        <div class="logo-area">
            <div class="logo-icon">
            </div>
            <h2>标注信息收集系统</h2>
            <div class="sub">数据无价  谨慎操作</div>
        </div>

        <div id="alertBox"></div>

        <form id="loginForm">
            <div class="input-group">
                <label>用户名</label>
                <div class="input-wrapper">
                    <input type="text" id="username" placeholder="例如: 张三" autocomplete="off" required>
                </div>
            </div>
            <div class="input-group">
                <label>密码</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="••••••" required>
                </div>
            </div>
            <button type="submit" class="btn-login"> 登录系统</button>
        </form>
        <div class="info-note">
             Copyright &copy; Tydecent.
        </div>
    </div>
</div>

<script>
    const BASE_URL = '';

    const loginForm = document.getElementById('loginForm');
    const alertBox = document.getElementById('alertBox');

    function showError(msg) {
        alertBox.innerHTML = `<div class="error-message"> ${msg}</div>`;
        setTimeout(() => {
            if(alertBox.firstChild) alertBox.firstChild.style.opacity = '0';
            setTimeout(() => alertBox.innerHTML = '', 500);
        }, 3000);
    }

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        if(!username || !password) {
            showError('请填写用户名和密码');
            return;
        }

        // 禁用按钮避免重复提交
        const submitBtn = document.querySelector('.btn-login');
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '登录中...';
        submitBtn.disabled = true;

        try {
            const response = await fetch(`${BASE_URL}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',  // 重要: 携带 Cookie 维持 Session
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();
            if (response.ok) {
                // 登录成功 根据角色跳转
                const role = data.role;
                if (role === 'annotator') {
                    window.location.href = 'annotator.html';
                } else if (role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    showError('未知角色, 请联系管理员');
                }
            } else {
                showError(data.error || '用户名或密码错误');
            }
        } catch (err) {
            console.error(err);
            showError('网络错误，无法连接服务器');
        } finally {
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
        }
    });

    // 检查是否已经登录 (如果访问登录页时已经有有效session，直接跳转至相应仪表盘)
    async function checkAlreadyLogged() {
        try {
            const res = await fetch(`${BASE_URL}/api/session`, {
                credentials: 'include'
            });
            if (res.ok) {
                const session = await res.json();
                if (session.username && session.role) {
                    if (session.role === 'annotator') location.href = 'annotator.html';
                    else if (session.role === 'admin') location.href = 'admin.html';
                }
            }
        } catch(e) { /* 静默失败，保留登录页面 */ }
    }
    checkAlreadyLogged();
</script>
</body>
</html>
